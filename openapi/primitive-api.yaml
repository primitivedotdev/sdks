openapi: 3.1.0
info:
  title: Primitive API
  version: 1.0.0
  description: |
    The Primitive API lets you manage domains, emails, webhook endpoints,
    filters, and account settings programmatically.

    ## Authentication

    All endpoints require a Bearer token in the `Authorization` header:

    ```
    Authorization: Bearer prim_<your_api_key>
    ```

    API keys are org-scoped. Create and manage them in your dashboard
    under Settings > API Keys.

    ## Rate Limiting

    The API enforces a sliding window rate limit of **120 requests per
    60 seconds** per organization. When exceeded, the API returns `429`
    with a `Retry-After` header indicating how many seconds to wait.

    ## Pagination

    List endpoints use cursor-based pagination. Responses include a
    `meta` object with `total`, `limit`, and `cursor` fields. Pass the
    `cursor` value as a query parameter to fetch the next page. When
    `cursor` is `null`, there are no more results.

    ## Response Format

    All responses use a consistent envelope:

    ```json
    {
      "success": true,
      "data": { ... },
      "meta": { "total": 42, "limit": 50, "cursor": "..." }
    }
    ```

    Errors follow the same pattern:

    ```json
    {
      "success": false,
      "error": { "code": "not_found", "message": "Email not found" }
    }
    ```
  contact:
    name: Primitive
    url: https://primitive.dev
  license:
    name: Proprietary
    url: https://primitive.dev/terms

servers:
  - url: https://www.primitive.dev/api/v1
    description: Production

security:
  - BearerAuth: []

tags:
  - name: Account
    description: Manage your account settings, storage, and webhook secret
  - name: Domains
    description: Claim, verify, and manage email domains
  - name: Emails
    description: List, inspect, and manage received emails
  - name: Sending
    description: Send outbound emails through the Primitive API
  - name: Endpoints
    description: Manage webhook endpoints that receive email events
  - name: Filters
    description: Manage whitelist and blocklist filter rules
  - name: Webhook Deliveries
    description: View and replay webhook delivery attempts

paths:
  # ---------------------------------------------------------------------------
  # Account
  # ---------------------------------------------------------------------------
  /account:
    get:
      operationId: getAccount
      summary: Get account info
      tags: [Account]
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Account'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      operationId: updateAccount
      summary: Update account settings
      tags: [Account]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountInput'
      responses:
        '200':
          description: Updated account
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AccountUpdated'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /account/storage:
    get:
      operationId: getStorageStats
      summary: Get storage usage
      tags: [Account]
      responses:
        '200':
          description: Storage statistics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/StorageStats'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /account/webhook-secret:
    get:
      operationId: getWebhookSecret
      summary: Get webhook signing secret
      description: |
        Returns the webhook signing secret for your account. If no secret
        exists yet, one is generated automatically on first access.
      tags: [Account]
      responses:
        '200':
          description: Webhook secret
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/WebhookSecret'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /account/webhook-secret/rotate:
    post:
      operationId: rotateWebhookSecret
      summary: Rotate webhook signing secret
      description: |
        Generates a new webhook signing secret, replacing the current one.
        Rate limited to once per 60 minutes.
      tags: [Account]
      responses:
        '200':
          description: New webhook secret
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/WebhookSecret'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'

  # ---------------------------------------------------------------------------
  # Domains
  # ---------------------------------------------------------------------------
  /domains:
    get:
      operationId: listDomains
      summary: List all domains
      description: |
        Returns all verified and unverified domains for your organization,
        sorted by creation date (newest first). Each domain includes a
        `verified` boolean to distinguish between the two states.
      tags: [Domains]
      responses:
        '200':
          description: List of domains
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Domain'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      operationId: addDomain
      summary: Claim a new domain
      description: |
        Creates an unverified domain claim. You will receive a
        `verification_token` to add as a DNS TXT record before
        calling the verify endpoint.
      tags: [Domains]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddDomainInput'
      responses:
        '201':
          description: Domain claim created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UnverifiedDomain'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: |
            Domain claim conflicts with existing state. Two error codes
            are possible:
              * `mx_conflict`: the domain's current MX records point at
                another mailbox provider. The response includes
                `error.details.mx_conflict` with the detected provider
                and a suggested subdomain.
              * `conflict`: the domain is already claimed by another
                org, or a pending claim exists for another user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                mx_conflict:
                  summary: Domain has MX records on another provider
                  value:
                    success: false
                    error:
                      code: mx_conflict
                      message: Domain is currently receiving mail via another provider
                      details:
                        mx_conflict:
                          provider_name: Google Workspace
                          suggested_subdomain: mail
                already_claimed:
                  summary: Domain already claimed by another org
                  value:
                    success: false
                    error:
                      code: conflict
                      message: Domain is already claimed by another organization

  /domains/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceId'

    patch:
      operationId: updateDomain
      summary: Update domain settings
      description: |
        Update a verified domain's settings. Only verified domains can be
        updated. Per-domain spam thresholds require a Pro plan.
      tags: [Domains]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDomainInput'
      responses:
        '200':
          description: Updated domain
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/VerifiedDomain'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      operationId: deleteDomain
      summary: Delete a domain
      description: Deletes a verified or unverified domain claim.
      tags: [Domains]
      responses:
        '200':
          $ref: '#/components/responses/Deleted'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /domains/{id}/verify:
    parameters:
      - $ref: '#/components/parameters/ResourceId'

    post:
      operationId: verifyDomain
      summary: Verify domain ownership
      description: |
        Checks DNS records (MX and TXT) to verify domain ownership.
        On success, the domain is promoted from unverified to verified.
        On failure, returns which checks passed and which failed.
      tags: [Domains]
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DomainVerifyResult'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------------------------------------------------------------------------
  # Emails
  # ---------------------------------------------------------------------------
  /emails:
    get:
      operationId: listEmails
      summary: List emails
      description: |
        Returns a paginated list of received emails. Supports filtering by
        domain, status, date range, and free-text search across subject,
        sender, and recipient fields.
      tags: [Emails]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: domain_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by domain ID
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, accepted, completed, rejected]
          description: Filter by email status
        - name: search
          in: query
          schema:
            type: string
            maxLength: 500
          description: Search subject, sender, and recipient (case-insensitive)
        - name: date_from
          in: query
          schema:
            type: string
            format: date-time
          description: Filter emails created on or after this timestamp
        - name: date_to
          in: query
          schema:
            type: string
            format: date-time
          description: Filter emails created on or before this timestamp
      responses:
        '200':
          description: Paginated list of emails
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ListEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/EmailSummary'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /emails/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceId'

    get:
      operationId: getEmail
      summary: Get email details
      tags: [Emails]
      responses:
        '200':
          description: Email details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/EmailDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      operationId: deleteEmail
      summary: Delete an email
      tags: [Emails]
      responses:
        '200':
          $ref: '#/components/responses/Deleted'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /emails/{id}/raw:
    parameters:
      - $ref: '#/components/parameters/ResourceId'

    get:
      operationId: downloadRawEmail
      summary: Download raw email
      description: |
        Downloads the raw RFC 822 email file (.eml). Authenticates via
        a signed download token (provided in webhook payloads) or a
        valid session.
      tags: [Emails]
      security:
        - BearerAuth: []
        - DownloadToken: []
      parameters:
        - name: token
          in: query
          schema:
            type: string
          description: Signed download token from webhook payload
      responses:
        '200':
          description: Raw email file
          content:
            message/rfc822:
              schema:
                type: string
                format: binary
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="email-id.eml"'
            X-Content-SHA256:
              schema:
                type: string
              description: SHA-256 hex digest of the file
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /emails/{id}/attachments.tar.gz:
    parameters:
      - $ref: '#/components/parameters/ResourceId'

    get:
      operationId: downloadAttachments
      summary: Download email attachments
      description: |
        Downloads all attachments as a gzip-compressed tar archive.
        Authenticates via a signed download token (provided in webhook
        payloads) or a valid session.
      tags: [Emails]
      security:
        - BearerAuth: []
        - DownloadToken: []
      parameters:
        - name: token
          in: query
          schema:
            type: string
          description: Signed download token from webhook payload
      responses:
        '200':
          description: Attachments archive
          content:
            application/gzip:
              schema:
                type: string
                format: binary
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="email-id_attachments.tar.gz"'
            X-Content-SHA256:
              schema:
                type: string
              description: SHA-256 hex digest of the archive
            X-Attachment-Count:
              schema:
                type: string
              description: Number of attachments in the archive
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /emails/{id}/replay:
    parameters:
      - $ref: '#/components/parameters/ResourceId'

    post:
      operationId: replayEmailWebhooks
      summary: Replay email webhooks
      description: |
        Re-delivers the webhook payload for this email to all active
        endpoints matching the email's domain. Rate limited per-email
        (short cooldown between successive replays of the same email)
        and per-org (burst + sustained windows), sharing an org-wide
        budget with delivery replays.
      tags: [Emails]
      responses:
        '200':
          description: Replay result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReplayResult'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'

  # ---------------------------------------------------------------------------
  # Endpoints
  # ---------------------------------------------------------------------------
  /endpoints:
    get:
      operationId: listEndpoints
      summary: List webhook endpoints
      description: Returns all active (non-deleted) webhook endpoints.
      tags: [Endpoints]
      responses:
        '200':
          description: List of endpoints
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Endpoint'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      operationId: createEndpoint
      summary: Create a webhook endpoint
      description: |
        Creates a new webhook endpoint. If a deactivated endpoint with the
        same URL and domain exists, it is reactivated instead.
        Subject to plan limits on the number of active endpoints.
      tags: [Endpoints]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEndpointInput'
      responses:
        '201':
          description: Endpoint created (or reactivated)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Endpoint'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /endpoints/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceId'

    patch:
      operationId: updateEndpoint
      summary: Update a webhook endpoint
      description: |
        Updates an active webhook endpoint. If the URL is changed, the old
        endpoint is deactivated and a new one is created (or an existing
        deactivated endpoint with the new URL is reactivated).
      tags: [Endpoints]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEndpointInput'
      responses:
        '200':
          description: Updated endpoint
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Endpoint'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      operationId: deleteEndpoint
      summary: Delete a webhook endpoint
      description: |
        Soft-deletes a webhook endpoint. The endpoint will no longer
        receive webhook deliveries.
      tags: [Endpoints]
      responses:
        '200':
          $ref: '#/components/responses/Deleted'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /endpoints/{id}/test:
    parameters:
      - $ref: '#/components/parameters/ResourceId'

    post:
      operationId: testEndpoint
      summary: Send a test webhook
      description: |
        Sends a sample `email.received` event to the endpoint. The request
        includes SSRF protection (private IP rejection and DNS pinning).
        Rate limited to 4 per minute and 30 per hour (non-exempt).
        Successful deliveries and verified-domain endpoints are exempt
        from the rate limit.
      tags: [Endpoints]
      responses:
        '200':
          description: Test result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TestResult'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'

  # ---------------------------------------------------------------------------
  # Filters
  # ---------------------------------------------------------------------------
  /filters:
    get:
      operationId: listFilters
      summary: List filter rules
      description: Returns all whitelist and blocklist filter rules.
      tags: [Filters]
      responses:
        '200':
          description: List of filters
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Filter'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      operationId: createFilter
      summary: Create a filter rule
      description: |
        Creates a new whitelist or blocklist filter. Per-domain filters
        require a Pro plan. Patterns are stored as lowercase.
      tags: [Filters]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFilterInput'
      responses:
        '201':
          description: Filter created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Filter'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /filters/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceId'

    patch:
      operationId: updateFilter
      summary: Update a filter rule
      description: Toggle a filter's enabled state.
      tags: [Filters]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFilterInput'
      responses:
        '200':
          description: Updated filter
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Filter'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      operationId: deleteFilter
      summary: Delete a filter rule
      tags: [Filters]
      responses:
        '200':
          $ref: '#/components/responses/Deleted'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------------------------------------------------------------------------
  # Webhook Deliveries
  # ---------------------------------------------------------------------------
  /webhooks/deliveries:
    get:
      operationId: listDeliveries
      summary: List webhook deliveries
      description: |
        Returns a paginated list of webhook delivery attempts. Each delivery
        includes a nested `email` object with sender, recipient, and subject.
      tags: [Webhook Deliveries]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: email_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by email ID
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, delivered, header_confirmed, failed]
          description: Filter by delivery status
        - name: date_from
          in: query
          schema:
            type: string
            format: date-time
          description: Filter deliveries created on or after this timestamp
        - name: date_to
          in: query
          schema:
            type: string
            format: date-time
          description: Filter deliveries created on or before this timestamp
      responses:
        '200':
          description: Paginated list of deliveries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ListEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/DeliverySummary'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /webhooks/deliveries/{id}/replay:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          pattern: '^\d+$'
        description: Delivery ID (numeric)

    post:
      operationId: replayDelivery
      summary: Replay a webhook delivery
      description: |
        Re-sends the stored webhook payload from a previous delivery attempt.
        If the original endpoint is still active, it is targeted. If the
        original endpoint was deleted, the oldest active endpoint is used.
        Deactivated endpoints cannot be replayed to. Rate limited per-org,
        sharing an org-wide budget with email replays.
      tags: [Webhook Deliveries]
      responses:
        '200':
          description: Replay result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReplayResult'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'

  # ---------------------------------------------------------------------------
  # Sending
  # ---------------------------------------------------------------------------
  /send-mail:
    post:
      operationId: sendEmail
      summary: Send outbound email
      description: |
        Sends an outbound email synchronously. The request stays open until
        Primitive's outbound relay accepts or rejects the message.
      tags: [Sending]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMailInput'
      responses:
        '200':
          description: Outbound relay result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SendMailResult'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '502':
          $ref: '#/components/responses/BadGateway'
        '504':
          $ref: '#/components/responses/GatewayTimeout'

# =============================================================================
# Components
# =============================================================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: 'API key with `prim_` prefix: `Authorization: Bearer prim_<key>`'

    DownloadToken:
      type: apiKey
      in: query
      name: token
      description: Signed download token provided in webhook payloads

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Resource UUID

    Cursor:
      name: cursor
      in: query
      schema:
        type: string
      description: |
        Pagination cursor from a previous response's `meta.cursor` field.
        Format: `{ISO-datetime}|{id}`

    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
      description: Number of results per page

  responses:
    Unauthorized:
      description: Invalid or missing API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: unauthorized
              message: Invalid or missing API key

    Forbidden:
      description: Authenticated caller lacks permission for the operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: forbidden
              message: Insufficient permissions

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: not_found
              message: Resource not found

    ValidationError:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: validation_error
              message: Invalid domain format

    PayloadTooLarge:
      description: Request body exceeds the supported size limit
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: payload_too_large
              message: Body must be 65536 bytes or smaller

    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: rate_limit_exceeded
              message: Rate limit exceeded

    BadGateway:
      description: Primitive could not complete the downstream SMTP request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: bad_gateway
              message: Outbound SMTP service request failed

    GatewayTimeout:
      description: Primitive timed out waiting for the downstream SMTP request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: gateway_timeout
              message: Outbound SMTP service timed out

    Deleted:
      description: Resource deleted
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessEnvelope'
              - type: object
                properties:
                  data:
                    type: object
                    properties:
                      deleted:
                        type: boolean
                        const: true
                    required: [deleted]

  schemas:
    # -------------------------------------------------------------------------
    # Envelopes
    # -------------------------------------------------------------------------
    SuccessEnvelope:
      type: object
      properties:
        success:
          type: boolean
          const: true
      required: [success, data]

    ListEnvelope:
      type: object
      properties:
        success:
          type: boolean
          const: true
        meta:
          $ref: '#/components/schemas/PaginationMeta'
      required: [success, data, meta]

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
          description: Total number of matching records
        limit:
          type: integer
          description: Page size used for this request
        cursor:
          type: [string, 'null']
          description: Cursor for the next page, or null if no more results
      required: [total, limit, cursor]

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          const: false
        error:
          type: object
          properties:
            code:
              type: string
              enum:
                - unauthorized
                - forbidden
                - not_found
                - validation_error
                - rate_limit_exceeded
                - internal_error
                - conflict
                - mx_conflict
                - payload_too_large
                - bad_gateway
                - gateway_timeout
            message:
              type: string
            details:
              type: object
              description: |
                Optional structured data that callers can inspect to recover
                from the error. The fields present depend on `code`. Additional
                keys may be added over time without a major-version bump.
              additionalProperties: true
              properties:
                mx_conflict:
                  type: object
                  description: Present when `code == mx_conflict`.
                  required: [provider_name, suggested_subdomain]
                  properties:
                    provider_name:
                      type: string
                      description: Human-readable name of the detected mailbox provider (e.g. "Google Workspace").
                    suggested_subdomain:
                      type: string
                      description: Subdomain to try instead (e.g. "mail" for `mail.example.com`).
          required: [code, message]
      required: [success, error]

    # -------------------------------------------------------------------------
    # Account
    # -------------------------------------------------------------------------
    Account:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        plan:
          type: string
        created_at:
          type: string
          format: date-time
        onboarding_completed:
          type: boolean
        onboarding_step:
          type: [string, 'null']
        stripe_subscription_status:
          type: [string, 'null']
        subscription_current_period_end:
          type: [string, 'null']
          format: date-time
        subscription_cancel_at_period_end:
          type: [boolean, 'null']
        spam_threshold:
          type: [number, 'null']
          minimum: 0
          maximum: 15
        discard_content_on_webhook_confirmed:
          type: boolean
        webhook_secret_rotated_at:
          type: [string, 'null']
          format: date-time
      required:
        - id
        - email
        - plan
        - created_at
        - discard_content_on_webhook_confirmed

    AccountUpdated:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        plan:
          type: string
        spam_threshold:
          type: [number, 'null']
          minimum: 0
          maximum: 15
        discard_content_on_webhook_confirmed:
          type: boolean
      required: [id, email, plan, discard_content_on_webhook_confirmed]

    UpdateAccountInput:
      type: object
      additionalProperties: false
      properties:
        spam_threshold:
          type: [number, 'null']
          minimum: 0
          maximum: 15
          description: Global spam score threshold (0-15). Emails scoring above this are rejected. Set to null to disable.
        discard_content_on_webhook_confirmed:
          type: boolean
          description: Whether to discard email content after the webhook endpoint confirms receipt.
      minProperties: 1

    StorageStats:
      type: object
      properties:
        used_bytes:
          type: integer
          description: Total storage used in bytes
        used_kb:
          type: number
          description: Total storage used in kilobytes (1 decimal)
        used_mb:
          type: number
          description: Total storage used in megabytes (2 decimals)
        quota_mb:
          type: number
          description: Storage quota in megabytes (based on plan)
        percentage:
          type: number
          description: Percentage of quota used (1 decimal)
        emails_count:
          type: integer
          description: Number of stored emails
      required: [used_bytes, used_kb, used_mb, quota_mb, percentage, emails_count]

    WebhookSecret:
      type: object
      properties:
        secret:
          type: string
          description: The webhook signing secret value
      required: [secret]

    # -------------------------------------------------------------------------
    # Domains
    # -------------------------------------------------------------------------
    Domain:
      description: |
        A domain can be either verified or unverified. Verified domains have
        `is_active` and `spam_threshold` fields. Unverified domains have a
        `verification_token` for DNS verification.
      oneOf:
        - $ref: '#/components/schemas/VerifiedDomain'
        - $ref: '#/components/schemas/UnverifiedDomain'

    VerifiedDomain:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        domain:
          type: string
        verified:
          type: boolean
          const: true
        is_active:
          type: boolean
        spam_threshold:
          type: [number, 'null']
          minimum: 0
          maximum: 15
        verification_token:
          type: [string, 'null']
        created_at:
          type: string
          format: date-time
      required: [id, org_id, domain, verified, is_active, created_at]

    UnverifiedDomain:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        domain:
          type: string
        verified:
          type: boolean
          const: false
        verification_token:
          type: string
          description: Add this value as a TXT record to verify ownership
        created_at:
          type: string
          format: date-time
      required: [id, org_id, domain, verified, verification_token, created_at]

    AddDomainInput:
      type: object
      additionalProperties: false
      properties:
        domain:
          type: string
          minLength: 1
          maxLength: 253
          description: The domain name to claim (e.g. "example.com")
      required: [domain]

    UpdateDomainInput:
      type: object
      additionalProperties: false
      properties:
        is_active:
          type: boolean
          description: Whether the domain accepts incoming emails
        spam_threshold:
          type: [number, 'null']
          minimum: 0
          maximum: 15
          description: Per-domain spam threshold override (Pro plan required)
      minProperties: 1

    DomainVerifyResult:
      oneOf:
        - type: object
          properties:
            verified:
              type: boolean
              const: true
          required: [verified]
        - type: object
          properties:
            verified:
              type: boolean
              const: false
            mxFound:
              type: boolean
              description: Whether MX records point to Primitive
            txtFound:
              type: boolean
              description: Whether the TXT verification record was found
            error:
              type: string
              description: Human-readable verification failure reason
          required: [verified, mxFound, txtFound, error]

    # -------------------------------------------------------------------------
    # Emails
    # -------------------------------------------------------------------------
    EmailSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        message_id:
          type: [string, 'null']
        domain_id:
          type: [string, 'null']
          format: uuid
        org_id:
          type: [string, 'null']
          format: uuid
        status:
          type: string
          enum: [pending, accepted, completed, rejected]
        sender:
          type: string
        recipient:
          type: string
        subject:
          type: [string, 'null']
        domain:
          type: string
        spam_score:
          type: [number, 'null']
        created_at:
          type: string
          format: date-time
        received_at:
          type: string
          format: date-time
        raw_size_bytes:
          type: [integer, 'null']
        webhook_status:
          type: [string, 'null']
          enum: [pending, in_flight, fired, failed, exhausted, null]
        webhook_attempt_count:
          type: integer
      required:
        - id
        - status
        - sender
        - recipient
        - domain
        - created_at
        - received_at
        - webhook_attempt_count

    EmailDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        message_id:
          type: [string, 'null']
        domain_id:
          type: [string, 'null']
          format: uuid
        org_id:
          type: [string, 'null']
          format: uuid
        sender:
          type: string
        recipient:
          type: string
        subject:
          type: [string, 'null']
        status:
          type: string
          enum: [pending, accepted, completed, rejected]
        domain:
          type: string
        spam_score:
          type: [number, 'null']
        raw_size_bytes:
          type: [integer, 'null']
        raw_sha256:
          type: [string, 'null']
        created_at:
          type: string
          format: date-time
        received_at:
          type: string
          format: date-time
        rejection_reason:
          type: [string, 'null']
        webhook_status:
          type: [string, 'null']
          enum: [pending, in_flight, fired, failed, exhausted, null]
        webhook_attempt_count:
          type: integer
        webhook_last_attempt_at:
          type: [string, 'null']
          format: date-time
        webhook_last_status_code:
          type: [integer, 'null']
        webhook_last_error:
          type: [string, 'null']
        webhook_fired_at:
          type: [string, 'null']
          format: date-time
        smtp_helo:
          type: [string, 'null']
        smtp_mail_from:
          type: [string, 'null']
        smtp_rcpt_to:
          type: [array, 'null']
          items:
            type: string
        from_header:
          type: [string, 'null']
        content_discarded_at:
          type: [string, 'null']
          format: date-time
        content_discarded_by_delivery_id:
          type: [string, 'null']
        from_email:
          type: string
          description: Parsed from address (from_header or sender fallback)
        to_email:
          type: string
          description: Parsed to address (same as recipient)
      required:
        - id
        - sender
        - recipient
        - status
        - domain
        - created_at
        - received_at
        - webhook_attempt_count
        - from_email
        - to_email

    # -------------------------------------------------------------------------
    # Sending
    # -------------------------------------------------------------------------
    SendMailInput:
      type: object
      additionalProperties: false
      properties:
        from:
          type: string
          minLength: 3
          maxLength: 998
          description: RFC 5322 From header. The sender domain must be a verified outbound domain for your organization.
        to:
          type: string
          minLength: 3
          maxLength: 320
          description: Recipient address. Recipient eligibility depends on your account's outbound entitlements.
        subject:
          type: string
          minLength: 1
          maxLength: 998
          description: Subject line for the outbound message
        body_text:
          type: string
          maxLength: 81920
          description: Plain-text message body. At least one of body_text or body_html is required.
        body_html:
          type: string
          maxLength: 81920
          description: HTML message body. At least one of body_text or body_html is required.
        in_reply_to:
          type: string
          minLength: 1
          maxLength: 998
          pattern: '^[^\x00-\x1F\x7F]+$'
          description: Message-ID of the direct parent email when sending a threaded reply.
        references:
          type: array
          maxItems: 100
          description: Full ordered message-id chain for the thread.
          items:
            type: string
            minLength: 1
            maxLength: 998
            pattern: '^[^\x00-\x1F\x7F]+$'
      required: [from, to, subject]

    SendMailResult:
      type: object
      properties:
        queue_id:
          type: string
          description: Message identifier assigned by Primitive's outbound relay, when available.
        accepted:
          type: array
          items:
            type: string
          description: Recipient addresses accepted by the relay.
        rejected:
          type: array
          items:
            type: string
          description: Recipient addresses rejected by the relay.
      required: [accepted, rejected]

    # -------------------------------------------------------------------------
    # Endpoints
    # -------------------------------------------------------------------------
    Endpoint:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        url:
          type: [string, 'null']
        enabled:
          type: boolean
        domain_id:
          type: [string, 'null']
          format: uuid
          description: Restrict this endpoint to emails from a specific domain
        rules:
          type: object
          description: Endpoint-specific filtering rules
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        delivery_count:
          type: integer
          description: Total webhook deliveries attempted
        success_count:
          type: integer
          description: Successful deliveries
        failure_count:
          type: integer
          description: Failed deliveries
        consecutive_fails:
          type: integer
          description: Current streak of consecutive failures
        last_delivery_at:
          type: [string, 'null']
          format: date-time
        last_success_at:
          type: [string, 'null']
          format: date-time
        last_failure_at:
          type: [string, 'null']
          format: date-time
        deactivated_at:
          type: [string, 'null']
          format: date-time
      required:
        - id
        - org_id
        - enabled
        - rules
        - created_at
        - updated_at
        - delivery_count
        - success_count
        - failure_count
        - consecutive_fails

    CreateEndpointInput:
      type: object
      additionalProperties: false
      properties:
        url:
          type: string
          minLength: 1
          description: The webhook URL to deliver events to
        enabled:
          type: boolean
          default: true
          description: Whether the endpoint is active
        domain_id:
          type: [string, 'null']
          format: uuid
          description: Restrict to emails from a specific domain
        rules:
          type: object
          description: Endpoint-specific filtering rules
      required: [url]

    UpdateEndpointInput:
      type: object
      additionalProperties: false
      properties:
        url:
          type: string
          minLength: 1
          description: New webhook URL (triggers endpoint rotation)
        enabled:
          type: boolean
        domain_id:
          type: [string, 'null']
          format: uuid
        rules:
          type: object
      minProperties: 1

    TestResult:
      type: object
      properties:
        status:
          type: integer
          description: HTTP status code returned by the endpoint
        body:
          type: string
          description: Response body (truncated to 1000 characters)
        signature:
          type: string
          description: The signature header value sent (if webhook secret is configured)
      required: [status, body]

    # -------------------------------------------------------------------------
    # Filters
    # -------------------------------------------------------------------------
    Filter:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        domain_id:
          type: [string, 'null']
          format: uuid
          description: If set, filter applies only to this domain
        type:
          type: string
          enum: [whitelist, blocklist]
        pattern:
          type: string
          description: Email address or pattern to match (stored lowercase)
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
      required: [id, org_id, type, pattern, enabled, created_at]

    CreateFilterInput:
      type: object
      additionalProperties: false
      properties:
        type:
          type: string
          enum: [whitelist, blocklist]
        pattern:
          type: string
          minLength: 1
          maxLength: 500
          description: Email address or pattern to filter
        domain_id:
          type: [string, 'null']
          format: uuid
          description: Restrict filter to a specific domain (Pro plan required)
      required: [type, pattern]

    UpdateFilterInput:
      type: object
      additionalProperties: false
      properties:
        enabled:
          type: boolean
      required: [enabled]

    # -------------------------------------------------------------------------
    # Webhook Deliveries
    # -------------------------------------------------------------------------
    DeliverySummary:
      type: object
      properties:
        id:
          type: string
          description: Delivery ID (numeric string)
        email_id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        endpoint_id:
          type: string
          format: uuid
        endpoint_url:
          type: string
        status:
          type: string
          enum: [pending, delivered, header_confirmed, failed]
        attempt_count:
          type: integer
        duration_ms:
          type: [integer, 'null']
        last_error:
          type: [string, 'null']
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        email:
          type: [object, 'null']
          properties:
            sender:
              type: string
            recipient:
              type: string
            subject:
              type: [string, 'null']
          required: [sender, recipient]
      required:
        - id
        - email_id
        - org_id
        - endpoint_id
        - endpoint_url
        - status
        - attempt_count
        - created_at
        - updated_at

    # -------------------------------------------------------------------------
    # Shared
    # -------------------------------------------------------------------------
    ReplayResult:
      type: object
      properties:
        delivered:
          type: integer
          description: Number of successful deliveries
        failed:
          type: integer
          description: Number of failed deliveries
      required: [delivered, failed]
