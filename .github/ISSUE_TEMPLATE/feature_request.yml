name: Feature request
description: Propose a new capability or workflow improvement.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What should change?
    validations:
      required: true
  - type: checkboxes
    id: sdk
    attributes:
      label: Affected SDKs
      options:
        - label: Node
        - label: Python
        - label: Go
        - label: Shared contract / fixtures
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Why is this needed?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed approach
      description: Describe the expected API or workflow.
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Include compatibility, rollout, or fixture implications.
