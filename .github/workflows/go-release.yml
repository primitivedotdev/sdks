name: Go Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - 'sdk-go/VERSION'

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write

jobs:
  release:
    name: Publish Go SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Detect version change
        id: version
        run: |
          current_version=$(tr -d '[:space:]' < sdk-go/VERSION)
          previous_version=

          if git cat-file -e "${{ github.event.before }}:sdk-go/VERSION" 2>/dev/null; then
            previous_version=$(git show "${{ github.event.before }}:sdk-go/VERSION" | tr -d '[:space:]')
          fi

          printf 'current=%s\n' "$current_version" >> "$GITHUB_OUTPUT"

          case "$current_version" in
            ''|*[!0-9A-Za-z.+-]* )
              printf 'changed=false\n' >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          if ! printf '%s' "$current_version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$'; then
            printf 'changed=false\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$current_version" = "$previous_version" ]; then
            printf 'changed=false\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf 'changed=true\n' >> "$GITHUB_OUTPUT"

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
        if: ${{ steps.version.outputs.changed == 'true' }}
        with:
          python-version: "3.14"

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        if: ${{ steps.version.outputs.changed == 'true' }}
        with:
          version: 10

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        if: ${{ steps.version.outputs.changed == 'true' }}
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: sdk-node/pnpm-lock.yaml

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        if: ${{ steps.version.outputs.changed == 'true' }}
        with:
          go-version: "1.26"
          cache-dependency-path: sdk-go/go.sum

      - name: Ensure release tag does not already exist
        if: ${{ steps.version.outputs.changed == 'true' }}
        env:
          TAG: sdk-go/v${{ steps.version.outputs.current }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists" >&2
            exit 1
          fi

      - name: Run full release validation
        if: ${{ steps.version.outputs.changed == 'true' }}
        run: make ci release-check

      - name: Create GitHub release and tag
        if: ${{ steps.version.outputs.changed == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: sdk-go/v${{ steps.version.outputs.current }}
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "Go SDK v$VERSION" \
            --generate-notes
